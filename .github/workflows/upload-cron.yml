name: Scheduled Video Uploads Cron

on:
  schedule:
    # Runs every 15 minutes (or adjust as needed)
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub to test it

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Upload Cron API
        run: |
          curl -f -X GET "https://ytautomate.codelove.in/api/cron/upload"
